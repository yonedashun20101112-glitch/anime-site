<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>自分のアニメ記録</title>
<div style="margin-bottom:20px;">
<input id="searchInput" type="text" placeholder="タイトルで検索" style="padding:10px; width:100%; max-width:320px; font-size:16px;">
</div>

<style>
body{
font-family:sans-serif;
background:#f0f3f7;
margin:40px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>自分のアニメ記録</h1>

<div id="animeList"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyEECR8Meu6JFmCWkROPb9bLVBkLO2b94MgIUz_IzlZG2cSeKQ8uM3bKR1xXV-xWXReWQ/exec";

let allAnime = [];

function formatDate(d){
  if(!d) return "";
  return String(d).slice(0, 10);
}

function renderAnime(list){
  const animeList = document.getElementById("animeList");

  if (!list.length) {
    animeList.innerHTML = "<p>該当する作品nなし</p>";
    return;
  }

  animeList.innerHTML = list.map(a => `
    <div class="card">
      <img src="${a.card_image}" alt="${a.title || ""}" style="width:100%; border-radius:10px; margin-bottom:12px;">
      <h2>${a.title || ""}</h2>
      <p>放送: ${formatDate(a.broadcast_start)} 〜 ${formatDate(a.broadcast_end)}</p>
      <p>視聴: ${formatDate(a.watch_start)} 〜 ${formatDate(a.watch_end)}</p>
      <p>評価: ${a.score || "-"} (${a.rank || "-"})</p>
      <p>声優: ${a.voice_actors || "-"}</p>
    </div>
  `).join("");
}

async function loadAnime(){
  const res = await fetch(API_URL);
  const data = await res.json();

  allAnime = data;
  renderAnime(allAnime);
}

document.addEventListener("DOMContentLoaded", () => {
  const searchInput = document.getElementById("searchInput");

  searchInput.addEventListener("input", function(e){
    const keyword = e.target.value.toLowerCase();

    const filtered = allAnime.filter(a =>
      String(a.title || "").toLowerCase().includes(keyword)
    );

    renderAnime(filtered);
  });

  loadAnime();
});
</script>
</body>
</html>
