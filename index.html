<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>自分のアニメ記録</title>
<div style="margin-bottom:20px;">
  <input id="searchInput" type="text" placeholder="タイトルで検索" style="padding:10px; width:100%; max-width:320px; font-size:16px;">
</div>

<style>
body{
font-family:sans-serif;
background:#f0f3f7;
margin:40px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>自分のアニメ記録</h1>

<div id="animeList"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxh41Tc_TzHdzY2FOqvIPdqQ2nNhfOeCSCdd_bFlTBqAQDZTELsaDxbVnA39Rc2T3sDpw/exec";
let allAnime = [];  
function formatDate(d){
  if(!d) return "";
  return String(d).slice(0, 10);
}
async function loadAnime(){

const res = await fetch(API_URL);
const data = await res.json();

const list = document.getElementById("animeList");

list.innerHTML = data.map(a => `
<div class="card">
<h2>${a.title}</h2>
放送: ${formatDate(a.broadcast_start)} 〜 ${formatDate(a.broadcast_end)}
視聴: ${formatDate(a.watch_start)} 〜 ${formatDate(a.watch_end)}
<p>評価: ${a.score} (${a.rank})</p>
<p>声優: ${a.voice_actors}</p>
</div>
`).join("");

}

loadAnime();
  document.getElementById("searchInput").addEventListener("input", function(e) {
  const keyword = e.target.value.toLowerCase();

  const filtered = allAnime.filter(a =>
    a.title.toLowerCase().includes(keyword)
  );

  renderAnime(filtered);
});

</script>

</body>
</html>
